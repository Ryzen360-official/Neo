# Neo Calamares installer configuration
---
modules-search: [ local, /usr/lib64/calamares/modules ]

branding: neo

instances: []

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - locale
    - keyboard
    - localecfg
    - fstab
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - dracut
    - bootloader
    - grubcfg
    - umount
  - show:
    - finished

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false
